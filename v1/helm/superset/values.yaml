# helm/superset/values.yaml

image:
  repository: apache/superset
  tag: 4.0.0
  pullPolicy: IfNotPresent

replicaCount: 1

# Service configuration
service:
  type: ClusterIP
  port: 8088

# Environment variables
env:
  - name: SUPERSET_SECRET_KEY
    value: "streaming-superset-secret-key-change-in-prod"
  - name: ADMIN_USERNAME
    value: "admin"
  - name: ADMIN_FIRST_NAME
    value: "Admin"
  - name: ADMIN_LAST_NAME
    value: "User"
  - name: ADMIN_EMAIL
    value: "admin@example.com"
  - name: ADMIN_PASSWORD
    value: "admin"
  - name: SUPERSET_LOAD_EXAMPLES
    value: "no"
  - name: SUPERSET_PORT
    value: "8088"
  - name: SUPERSET_BIND_ADDRESS
    value: "0.0.0.0"

# Database (use internal SQLite for simplicity)
database:
  type: sqlite

# Cache (internal)
cache:
  type: redis
  host: redis
  port: 6379

# Resources
resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: 800m
    memory: 1Gi

# Ingress
ingress:
  enabled: false
