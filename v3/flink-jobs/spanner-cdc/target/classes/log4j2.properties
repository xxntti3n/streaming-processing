# Logging configuration for Spanner CDC job

rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

# Console appender
appender.console.name = ConsoleAppender
appender.console.type = CONSOLE
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# File appender (optional)
#appender.file.name = FileAppender
#appender.file.type = FILE
#appender.file.fileName = /tmp/flink-cdc.log
#appender.file.layout.type = PatternLayout
#appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# Specific logger levels
logger.gcloud.name = com.google.cloud
logger.gcloud.level = WARN

logger.spanner.name = com.google.cloud.spanner
logger.spanner.level = INFO

logger.flink.name = org.apache.flink
logger.flink.level = INFO
