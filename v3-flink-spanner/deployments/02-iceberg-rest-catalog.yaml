# Iceberg REST Catalog Deployment
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest-catalog
  namespace: default
spec:
  selector:
    app: iceberg-rest-catalog
  ports:
  - port: 8181
    targetPort: 8181
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest-catalog
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-rest-catalog
  template:
    metadata:
      labels:
        app: iceberg-rest-catalog
    spec:
      containers:
      - name: iceberg-rest-catalog
        image: tabulario/iceberg-rest:0.9.0
        ports:
        - containerPort: 8181
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minioadmin"
        - name: AWS_REGION
          value: "us-east-1"
        - name: CATALOG_WAREHOUSE
          value: "s3a://warehouse/"
        - name: CATALOG_IO__IMPL
          value: "org.apache.iceberg.aws.s3.S3FileIO"
        - name: CATALOG_S3_ENDPOINT
          value: "http://minio:9000"
        - name: CATALOG_S3_PATH__STYLE__ACCESS
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
