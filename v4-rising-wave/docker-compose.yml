version: '3.8'

services:
  # PostgreSQL - Source Database with CDC enabled
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=10"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/01-init-postgres.sql:/docker-entrypoint-initdb.d/01-init-postgres.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # MinIO - S3-compatible storage
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    command:
      - server
      - "--address"
      - "0.0.0.0:9301"
      - "--console-address"
      - "0.0.0.0:9400"
      - /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hummockadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hummockadmin}
    ports:
      - "9301:9301"
      - "9400:9400"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9301/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # MinIO Client - Initialize buckets
  mc:
    image: minio/mc
    container_name: mc
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hummockadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hummockadmin}
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9301 \${MINIO_ROOT_USER} \${MINIO_ROOT_PASSWORD}) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb minio/hummock001 --ignore-existing;
      /usr/bin/mc mb minio/iceberg-data --ignore-existing;
      /usr/bin/mc anonymous set download minio/iceberg-data;
      echo 'MinIO buckets initialized successfully';
      exit 0;
      "

  # Lakekeeper Database - Stores Iceberg catalog metadata
  lakekeeper-db:
    image: postgres:16-alpine
    container_name: lakekeeper-db
    environment:
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5432 -d postgres"]
      interval: 2s
      timeout: 10s
      retries: 2
      start_period: 10s
    volumes:
      - lakekeeper_db:/var/lib/postgresql/data/pgdata
    restart: always

  # Lakekeeper Migration - Initialize database schema
  lakekeeper-migrate:
    image: ${LAKEKEEPER_IMAGE:-quay.io/lakekeeper/catalog:latest-main}
    container_name: lakekeeper-migrate
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: This-is-NOT-Secure-for-production!
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://postgres:postgres@lakekeeper-db:5432/postgres
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://postgres:postgres@lakekeeper-db:5432/postgres
      LAKEKEEPER__AUTHZ_BACKEND: allowall
    command: ["migrate"]
    depends_on:
      lakekeeper-db:
        condition: service_healthy
    restart: "no"

  # Lakekeeper - Iceberg REST Catalog Service
  lakekeeper:
    image: ${LAKEKEEPER_IMAGE:-quay.io/lakekeeper/catalog:latest-main}
    container_name: lakekeeper
    environment:
      LAKEKEEPER__PG_ENCRYPTION_KEY: This-is-NOT-Secure-for-production!
      LAKEKEEPER__PG_DATABASE_URL_READ: postgresql://postgres:postgres@lakekeeper-db:5432/postgres
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgresql://postgres:postgres@lakekeeper-db:5432/postgres
      LAKEKEEPER__AUTHZ_BACKEND: allowall
    command: ["serve"]
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully
    restart: always

  # Lakekeeper Bootstrap - Initialize warehouse
  lakekeeper-bootstrap:
    image: alpine:3.20
    container_name: lakekeeper-bootstrap
    depends_on:
      lakekeeper:
        condition: service_healthy
    command: |
      sh -lc '
        set -e
        apk add --no-cache curl >/dev/null 2>&1

        echo "Waiting for Lakekeeper to be ready..."
        sleep 5

        echo "Bootstrapping Lakekeeper..."
        for attempt in 1 2 3 4 5; do
          http=$$(curl -s -o /tmp/bootstrap.json -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d "{\"accept-terms-of-use\": true}" \
            http://lakekeeper:8181/management/v1/bootstrap)

          case "$$http" in
            200|201) echo "✓ Successfully bootstrapped Lakekeeper!"; break ;;
            400|409) echo "✓ Already bootstrapped or conflict; continuing..."; break ;;
            *) echo "Bootstrap attempt $$attempt failed (HTTP $$http)"; \
               [ $$attempt -eq 5 ] && { cat /tmp/bootstrap.json 2>/dev/null || true; exit 1; }; \
               sleep $$((2 ** attempt)) ;;
          esac
        done

        echo "Creating warehouse risingwave-warehouse..."
        sleep 2
        for attempt in 1 2 3 4 5; do
          http=$$(curl -s -o /tmp/warehouse.json -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"warehouse-name\": \"risingwave-warehouse\",
              \"delete-profile\": { \"type\": \"hard\" },
              \"storage-credential\": {
                \"type\": \"s3\",
                \"credential-type\": \"access-key\",
                \"aws-access-key-id\": \"hummockadmin\",
                \"aws-secret-access-key\": \"hummockadmin\"
              },
              \"storage-profile\": {
                \"type\": \"s3\",
                \"bucket\": \"hummock001\",
                \"region\": \"us-east-1\",
                \"flavor\": \"s3-compat\",
                \"endpoint\": \"http://minio:9301\",
                \"path-style-access\": true,
                \"sts-enabled\": false,
                \"key-prefix\": \"risingwave-iceberg\"
              }
            }" \
            http://lakekeeper:8181/management/v1/warehouse)

          case "$$http" in
            200|201) echo "✓ Successfully created warehouse!"; break ;;
            400|409) echo "✓ Warehouse already exists/overlaps; continuing..."; break ;;
            *) echo "Warehouse creation attempt $$attempt failed (HTTP $$http)"; \
               [ $$attempt -eq 5 ] && { cat /tmp/warehouse.json 2>/dev/null || true; exit 1; }; \
               sleep $$((2 ** attempt)) ;;
          esac
        done

        echo "🎉 Lakekeeper setup completed successfully!"
        echo "Catalog endpoint: http://lakekeeper:8181/catalog/"
        echo "Warehouse: risingwave-warehouse"
      '
    restart: "no"

  # RisingWave Standalone - Stream Processing Engine
  risingwave:
    image: ${RW_IMAGE:-risingwavelabs/risingwave:v2.7.1}
    container_name: risingwave
    command: "standalone --meta-opts=\" \
                    --listen-addr 0.0.0.0:5690 \
                    --advertise-addr 0.0.0.0:5690 \
                    --dashboard-host 0.0.0.0:5691 \
                    --backend sql \
                    --sql-endpoint postgres://postgres:postgres@postgres:5432/metadata \
                    --state-store hummock+minio://hummockadmin:hummockadmin@minio:9301/hummock001 \
                    --data-directory hummock_001\" \
                 --compute-opts=\" \
                    --listen-addr 0.0.0.0:5688 \
                    --advertise-addr 0.0.0.0:5688 \
                    --async-stack-trace verbose \
                    --parallelism 2 \
                    --total-memory-bytes 4294967296 \
                    --role both \
                    --meta-address http://0.0.0.0:5690 \
                    --memory-manager-target-bytes 4294967296\" \
                 --frontend-opts=\" \
                   --listen-addr 0.0.0.0:4566 \
                   --advertise-addr 0.0.0.0:4566 \
                   --health-check-listener-addr 0.0.0.0:6786 \
                   --meta-addr http://0.0.0.0:5690 \
                   --frontend-total-memory-bytes=2147483648\" \
                 --compactor-opts=\" \
                    --listen-addr 0.0.0.0:6660 \
                    --advertise-addr 0.0.0.0:6660 \
                    --meta-address http://0.0.0.0:5690 \
                    --compactor-total-memory-bytes=1073741824\""
    ports:
      - "4566:4566"   # SQL frontend
      - "5690:5690"   # Meta
      - "5691:5691"   # Dashboard
      - "6786:6786"   # Health check
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      RUST_BACKTRACE: "1"
      ENABLE_TELEMETRY: "false"
      RW_SECRET_STORE_PRIVATE_KEY_HEX: ${RW_SECRET_STORE_PRIVATE_KEY_HEX:-0123456789abcdef0123456789abcdef}
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'printf "GET / HTTP/1.1\n\n" > /dev/tcp/127.0.0.1/5688; exit $$?;'
        - bash -c '> /dev/tcp/127.0.0.1/4566; exit $$?;'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  lakekeeper_db:
    driver: local
