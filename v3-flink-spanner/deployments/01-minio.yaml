# MinIO Deployment for S3-compatible storage
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: default
spec:
  selector:
    app: minio
  ports:
  - port: 9000
    targetPort: 9000
    name: api
  - port: 9001
    targetPort: 9001
    name: console
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2024-03-30T09-41-56Z
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        args:
        - server
        - /data
        - --console-address
        - ":9001"
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
---
# Setup Job to create initial buckets
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: default
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mc
        image: minio/mc:RELEASE.2024-03-30T01-51-33Z
        command:
        - /bin/sh
        - -c
        - |
          sleep 10
          mc alias set minio http://minio:9000 minioadmin minioadmin
          mc mb minio/warehouse --ignore-existing
          mc anonymous set download minio/warehouse
        env:
        - name: MC_HOST_minio
          value: "http://minio:9000"
