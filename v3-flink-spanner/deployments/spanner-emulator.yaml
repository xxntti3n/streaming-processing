apiVersion: v1
kind: Service
metadata:
  name: spanner-emulator
  labels:
    app: spanner-emulator
spec:
  ports:
  - port: 9010
    name: grpc
    targetPort: 9010
  - port: 9020
    name: rest
    targetPort: 9020
  selector:
    app: spanner-emulator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spanner-emulator
  labels:
    app: spanner-emulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spanner-emulator
  template:
    metadata:
      labels:
        app: spanner-emulator
    spec:
      containers:
      - name: spanner-emulator
        image: gcr.io/cloud-spanner-emulator/emulator:1.5.1
        ports:
        - containerPort: 9010
          name: grpc
        - containerPort: 9020
          name: rest
        env:
        - name: SPANNER_EMULATOR_HOST
          value: "0.0.0.0:9010"
