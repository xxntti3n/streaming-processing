name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          docker compose config --quiet || docker-compose config --quiet
          echo "docker-compose valid"

      - name: Check scripts
        run: |
          bash -n submit-flink-job.sh
          bash -n verify-stack.sh
          test -f jobs/cdc_join_aggregate_to_iceberg.sql

  build:
    name: Build images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Flink image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: streaming-processing-flink:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Superset image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.superset
          push: false
          tags: streaming-processing-superset:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build mysql-data-inserter image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cron
          push: false
          tags: streaming-processing-mysql-inserter:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
