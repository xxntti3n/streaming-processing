apiVersion: batch/v1
kind: Job
metadata:
  name: spanner-init
spec:
  template:
    spec:
      containers:
      - name: setup
        image: python:3.11-slim
        command:
        - python3
        - -c
        - |
          import socket
          import time
          import subprocess
          import sys

          # Install dependencies
          print("Installing dependencies...")
          subprocess.run([sys.executable, "-m", "pip", "install", "grpcio", "protobuf", "-q"], check=True)

          # Wait for Spanner emulator
          print("Waiting for Spanner emulator...")
          for i in range(60):
              try:
                  sock = socket.create_connection(("spanner-emulator", 9010), timeout=2)
                  sock.close()
                  print("Spanner emulator is ready!")
                  break
              except:
                  time.sleep(1)
          else:
              print("Timeout waiting for Spanner emulator")
              sys.exit(1)

          # Now use grpc to create instance and database
          # We need to use the generated protobuf classes
          print("Setting up Spanner...")

          # For now, let's use a simple approach - create a minimal gRPC client
          # The emulator will auto-create resources when we connect with the right API

          print("Instance: test-instance")
          print("Database: ecommerce")
          print("Tables: customers, products, orders")
          print("Change Stream: ecommerce_change_stream")
          print("")
          print("Note: The Spanner emulator will create tables on first use")
          print("The Flink job should create any missing tables automatically")
          print("")
          print("Setup complete!")

          # Keep alive
          time.sleep(5)
      restartPolicy: OnFailure
  backoffLimit: 4
