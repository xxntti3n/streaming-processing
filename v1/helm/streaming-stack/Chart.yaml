apiVersion: v2
name: streaming-stack
description: Umbrella chart for streaming processing with Spark
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  # MySQL from Bitnami
  - name: mysql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: mysql.enabled
  # MinIO from Bitnami
  - name: minio
    version: 14.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
  # Kafka from Bitnami (includes Zookeeper)
  - name: kafka
    version: 30.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
