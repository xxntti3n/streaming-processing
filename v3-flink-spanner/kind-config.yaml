kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.28.0
    extraPortMappings:
      - containerPort: 8081
        hostPort: 8081
      - containerPort: 9000
        hostPort: 9000
      - containerPort: 9010
        hostPort: 9010
      - containerPort: 9020
        hostPort: 9020
      - containerPort: 6443
        hostPort: 6443
  - role: worker
    image: kindest/node:v1.28.0
    extraMounts:
      - hostPath: ./data
        containerPath: /data
