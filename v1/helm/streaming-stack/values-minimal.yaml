# helm/streaming-stack/values-minimal.yaml

mysql:
  enabled: true
  auth:
    rootPassword: "rootpw"
    database: "appdb"
  primary:
    configuration: |-
      [mysqld]
      server-id=1
      log-bin=mysql-bin
      binlog_format=ROW
      binlog_row_image=FULL
      gtid_mode=ON
      enforce_gtid_consistency=ON
  initdbScripts:
    init.sql: |
      CREATE DATABASE IF NOT EXISTS appdb;
      USE appdb;
      CREATE TABLE products (
        id INT PRIMARY KEY AUTO_INCREMENT,
        sku VARCHAR(64) NOT NULL UNIQUE,
        name VARCHAR(128) NOT NULL
      ) ENGINE=InnoDB;
      INSERT INTO products (sku, name) VALUES
      ('P-001','Widget Mini'),
      ('P-002','Widget Standard'),
      ('P-003','Widget Pro'),
      ('P-004','Widget Ultra');
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

minio:
  enabled: true
  auth:
    rootUser: "minio"
    rootPassword: "minio123"
  defaultBuckets: "warehouse,iceberg"
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

kafka:
  enabled: true
  # Use Kraft mode (no Zookeeper)
  zookeeper:
    enabled: false
  controller:
    replicaCount: 1
    resources:
      requests:
        cpu: 200m
        memory: 384Mi
  broker:
    replicaCount: 1
    resources:
      requests:
        cpu: 200m
        memory: 384Mi
