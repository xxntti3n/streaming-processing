apiVersion: batch/v1
kind: Job
metadata:
  name: spanner-setup
spec:
  template:
    spec:
      containers:
      - name: spanner-setup
        image: curlimages/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for Spanner emulator..."
          until nc -z spanner-emulator 9010; do
            echo "Waiting for spanner-emulator:9010..."
            sleep 2
          done
          echo "Spanner emulator is ready!"

          # Use Spanner admin API via gRPC gateway
          # Note: The emulator uses a different API format than production
          echo "Setting up Spanner via REST API..."

          # Create instance
          curl -X POST http://spanner-emulator:9020/v1/projects/test-project/instances \
            -H "Content-Type: application/json" \
            -d '{
              "instance": {
                "name": "projects/test-project/instances/test-instance",
                "config": "projects/test-project/instanceConfigs/emulator-config",
                "displayName": "Test Instance",
                "nodeCount": 1
              }
            }' || echo "Instance may already exist"

          # Create database
          curl -X POST http://spanner-emulator:9020/v1/projects/test-project/instances/test-instance/databases \
            -H "Content-Type: application/json" \
            -d '{
              "extraStatements": [
                "CREATE TABLE customers (customer_id INT64 NOT NULL, email STRING(100), name STRING(100), created_at TIMESTAMP, updated_at TIMESTAMP) PRIMARY KEY (customer_id)",
                "CREATE TABLE products (product_id INT64 NOT NULL, sku STRING(50), name STRING(200), price NUMERIC, category STRING(50), created_at TIMESTAMP) PRIMARY KEY (product_id)",
                "CREATE TABLE orders (order_id INT64 NOT NULL, customer_id INT64 NOT NULL, product_id INT64 NOT NULL, quantity INT64 NOT NULL, total_amount NUMERIC, order_status STRING(20), created_at TIMESTAMP, updated_at TIMESTAMP, FOREIGN KEY (customer_id) REFERENCES customers(customer_id), FOREIGN KEY (product_id) REFERENCES products(product_id)) PRIMARY KEY (order_id)",
                "CREATE CHANGE STREAM ecommerce_change_stream FOR customers, products, orders OPTIONS (retention_period = \"1h\", capture_value_change_type = \"NEW_ROW_AND_OLD_ROW\")"
              ]
            }' || echo "Database/tables may already exist"

          echo ""
          echo "=== Setup Complete ==="
          echo "Verifying..."
          curl -s http://spanner-emulator:9020/v1/projects/test-project/instances 2>/dev/null || echo "Done"
      restartPolicy: Never
  backoffLimit: 3
